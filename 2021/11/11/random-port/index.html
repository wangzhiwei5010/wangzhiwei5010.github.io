        <p>随机生成端口,搬砖</p>
<span id="more"></span>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><span class="line">PORT=0</span><br><span class="line"><span class="meta">#</span><span class="bash">判断当前端口是否被占用，没被占用返回0，反之1</span></span><br><span class="line">function Listening &#123;</span><br><span class="line">   TCPListeningnum=`netstat -an | grep &quot;:$1 &quot; | awk &#x27;$1 == &quot;tcp&quot; &amp;&amp; $NF == &quot;LISTEN&quot; &#123;print $0&#125;&#x27; | wc -l`</span><br><span class="line">   UDPListeningnum=`netstat -an | grep &quot;:$1 &quot; | awk &#x27;$1 == &quot;udp&quot; &amp;&amp; $NF == &quot;0.0.0.0:*&quot; &#123;print $0&#125;&#x27; | wc -l`</span><br><span class="line">   (( Listeningnum = TCPListeningnum + UDPListeningnum ))</span><br><span class="line">   if [ $Listeningnum == 0 ]; then</span><br><span class="line">       echo &quot;0&quot;</span><br><span class="line">   else</span><br><span class="line">       echo &quot;1&quot;</span><br><span class="line">   fi</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta"></span></span><br><span class="line"><span class="meta">#</span><span class="bash">指定区间随机数</span></span><br><span class="line">function random_range &#123;</span><br><span class="line">   shuf -i $1-$2 -n1</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta"></span></span><br><span class="line"><span class="meta">#</span><span class="bash">得到随机端口</span></span><br><span class="line">function get_random_port &#123;</span><br><span class="line">   templ=0</span><br><span class="line">   while [ $PORT == 0 ]; do</span><br><span class="line">       temp1=`random_range $1 $2`</span><br><span class="line">       if [ `Listening $temp1` == 0 ] ; then</span><br><span class="line">              PORT=$temp1</span><br><span class="line">       fi</span><br><span class="line">   done</span><br><span class="line">   echo &quot;port=$PORT&quot;</span><br><span class="line">&#125;</span><br><span class="line">get_random_port 1 10000; #这里指定了1~10000区间，从中任取一个未占用端口号</span><br></pre></td></tr></table></figure>
    </div>
